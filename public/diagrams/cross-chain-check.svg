<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <title>Cross-chain check ordering inside the verifier</title>
  <desc>A candidate block flows through three stages: execute_transactions, verify_block_refills (with helios query), and StateRoot.compute.</desc>
  <style>
    :root { --c: #222; }
    @media (prefers-color-scheme: dark) { :root { --c: #ddd; } }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--c); }
    .frame      { fill: none; stroke: var(--c); stroke-width: 1; stroke-dasharray: 4 4; opacity: 0.25; }
    .frame-lbl  { font-size: 10px; opacity: 0.55; font-style: italic; }
    .helios-box { fill: var(--c); fill-opacity: 0.06; stroke: var(--c); stroke-width: 1.5; rx: 6; }
    .helios-lbl { font-size: 11px; font-weight: 700; }
    .helios-sub { font-size: 9px; opacity: 0.6; }
    .stage rect { fill: var(--c); fill-opacity: 0.05; stroke: var(--c); stroke-width: 1.5; rx: 6; }
    .stage-lbl  { font-family: ui-monospace, 'SF Mono', monospace; font-size: 11px; font-weight: 700; }
    .stage-sub  { font-size: 9px; opacity: 0.65; }
    .stage      { opacity: 0.35; }
    @keyframes on { 0%,24% { opacity: 1; } 25%,100% { opacity: 0.35; } }
    .s1 { animation: on 12s infinite 0s; }
    .s2 { animation: on 12s infinite 3s; }
    .s3 { animation: on 12s infinite 6s; }
    .arr      { stroke: var(--c); stroke-width: 1.5; fill: none; opacity: 0.35; }
    .arr-head { fill: var(--c); opacity: 0.35; }
    .qr-line  { fill: none; stroke: var(--c); stroke-width: 2; stroke-dasharray: 5 4; opacity: 0; animation: march .7s linear infinite, qr-show 12s linear infinite; }
    .qr-lbl   { font-size: 8.5px; font-weight: 700; opacity: 0; animation: qr-show 12s linear infinite; }
    @keyframes march    { to { stroke-dashoffset: -9; } }
    @keyframes qr-show  { 0%,24% { opacity: 0; } 26%,49% { opacity: .8; } 50%,100% { opacity: 0; } }
    .blk-body  { fill: var(--c); fill-opacity: 0.1; stroke: var(--c); stroke-width: 1.5; rx: 4; }
    .blk-row   { stroke: var(--c); stroke-width: 1; opacity: 0.5; }
    .blk-lbl   { font-size: 9px; font-weight: 700; }
    .rows      { opacity: 0; animation: rows-show 12s infinite; }
    .rows rect { fill: #c0584a; fill-opacity: .7; stroke: #8c3e33; stroke-width: .8; rx: 1; }
    @keyframes rows-show { 0%,8% { opacity: 0; } 12%,65% { opacity: 1; } 70%,100% { opacity: 0; } }
    .sroot      { opacity: 0; animation: sroot-show 12s infinite; }
    .sroot rect { fill: #4a8e58; stroke: #336940; stroke-width: 1; rx: 3; }
    .sroot text { font-size: 8.5px; font-weight: 700; fill: #fff; }
    @keyframes sroot-show { 0%,68% { opacity: 0; } 72%,99% { opacity: 1; } 100% { opacity: 0; } }
    .commit { opacity: 0; }
    @keyframes commit-show { 0%,84% { opacity: 0; } 88% { opacity: 1; } 100% { opacity: 0; } }
    .commit { animation: commit-show 12s infinite; }
    .cap    { font-size: 10.5px; opacity: 0; }
    @keyframes cap-on { 0%,22% { opacity: .85; } 24%,100% { opacity: 0; } }
    .c1 { animation: cap-on 12s infinite 0s; }
    .c2 { animation: cap-on 12s infinite 3s; }
    .c3 { animation: cap-on 12s infinite 6s; }
    .c4 { animation: cap-on 12s infinite 9s; }
  </style>

  <!-- Helios sidecar -->
  <rect class="helios-box" x="280" y="6" width="160" height="42"/>
  <text class="helios-lbl" x="360" y="24" text-anchor="middle">helios sidecar</text>
  <text class="helios-sub" x="360" y="40" text-anchor="middle">light-client-verified eth_*</text>

  <!-- Query / response lines (visible during phase 2) -->
  <path class="qr-line" d="M 340 92 L 340 48"/>
  <path class="qr-line" d="M 380 48 L 380 92"/>
  <text class="qr-lbl" x="326" y="72" text-anchor="end">query ↑</text>
  <text class="qr-lbl" x="394" y="72" text-anchor="start">↓ verified</text>

  <!-- Frame -->
  <text class="frame-lbl" x="360" y="78" text-anchor="middle">inside one SERIALIZABLE block-execution transaction</text>
  <rect class="frame" x="50" y="84" width="620" height="100" rx="6"/>

  <!-- Stage 1 -->
  <g class="stage s1">
    <rect x="70" y="96" width="150" height="70"/>
    <text class="stage-lbl" x="145" y="120" text-anchor="middle">execute_transactions</text>
    <text class="stage-sub" x="145" y="137" text-anchor="middle">apply tx batch,</text>
    <text class="stage-sub" x="145" y="150" text-anchor="middle">insert bridge_mints rows</text>
  </g>
  <!-- Stage 2 -->
  <g class="stage s2">
    <rect x="285" y="96" width="150" height="70"/>
    <text class="stage-lbl" x="360" y="120" text-anchor="middle">verify_block_refills</text>
    <text class="stage-sub" x="360" y="137" text-anchor="middle">re-check each row</text>
    <text class="stage-sub" x="360" y="150" text-anchor="middle">via helios → finalized</text>
  </g>
  <!-- Stage 3 -->
  <g class="stage s3">
    <rect x="500" y="96" width="150" height="70"/>
    <text class="stage-lbl" x="575" y="120" text-anchor="middle">StateRoot.compute</text>
    <text class="stage-sub" x="575" y="137" text-anchor="middle">fold all four tables</text>
    <text class="stage-sub" x="575" y="150" text-anchor="middle">into one keccak root</text>
  </g>

  <!-- Arrows between stages -->
  <line class="arr" x1="225" y1="131" x2="280" y2="131"/>
  <polygon class="arr-head" points="280,131 274,128 274,134"/>
  <line class="arr" x1="440" y1="131" x2="495" y2="131"/>
  <polygon class="arr-head" points="495,131 489,128 489,134"/>

  <!-- Block packet -->
  <g>
    <rect class="blk-body" x="20" y="115" width="40" height="32"/>
    <line class="blk-row" x1="26" y1="123" x2="54" y2="123"/>
    <line class="blk-row" x1="26" y1="129" x2="54" y2="129"/>
    <line class="blk-row" x1="26" y1="135" x2="54" y2="135"/>
    <line class="blk-row" x1="26" y1="141" x2="54" y2="141"/>
    <text class="blk-lbl" x="40" y="162" text-anchor="middle">candidate</text>
    <g class="rows">
      <rect x="23" y="125" width="34" height="3"/>
      <rect x="23" y="131" width="34" height="3"/>
      <rect x="23" y="137" width="34" height="3"/>
    </g>
    <g class="sroot">
      <rect x="14" y="98" width="52" height="14"/>
      <text x="40" y="108" text-anchor="middle">state_root</text>
    </g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 0;105 0;105 0;320 0;320 0;535 0;535 0;660 0;660 0;660 0"
      keyTimes="0;0.04;0.125;0.25;0.375;0.5;0.625;0.75;0.875;0.98;1"
      dur="12s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.04;0.98;0.99;1" dur="12s" repeatCount="indefinite"/>
  </g>

  <!-- Committed ✓ -->
  <g class="commit">
    <circle cx="700" cy="131" r="13" fill="#4a8e58" stroke="#336940" stroke-width="1.5"/>
    <path d="M 694 131 L 698 136 L 706 125" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Phase captions -->
  <text class="cap c1" x="360" y="210" text-anchor="middle">1. Candidate block enters; verifier replays its transactions.</text>
  <text class="cap c2" x="360" y="210" text-anchor="middle">2. Each new bridge_mints row re-validated against finalized Ethereum via helios.</text>
  <text class="cap c3" x="360" y="210" text-anchor="middle">3. State root folds all four tables into one keccak digest.</text>
  <text class="cap c4" x="360" y="210" text-anchor="middle">4. Computed root matches the producer's claim — block committed.</text>
</svg>
