<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160">
  <style>
    :root { --c: #333; }
    @media (prefers-color-scheme: dark) { :root { --c: #ccc; } }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--c); }
    .frame     { fill: none; stroke: var(--c); stroke-width: 1; stroke-dasharray: 4 4; opacity: .2; }
    .frame-lbl { font-size: 10px; opacity: .5; font-style: italic; }
    .box       { fill: var(--c); fill-opacity: .05; stroke: var(--c); stroke-width: 1.5; rx: 6; }
    .box-lbl   { font-family: ui-monospace, 'SF Mono', monospace; font-size: 12px; font-weight: 600; }
    .box-sub   { font-size: 10px; opacity: .65; }
    .stage     { opacity: .3; }
    @keyframes pop { 0%,28%{ opacity:1; } 29%,100%{ opacity:.3; } }
    .s1 { animation: pop 6s infinite 0s; }
    .s2 { animation: pop 6s infinite 2s; }
    .s3 { animation: pop 6s infinite 4s; }
    .arr   { stroke: var(--c); stroke-width: 1.5; fill: none; opacity: .4; }
    .arr-h { fill: var(--c); opacity: .4; }
    .note  { font-size: 10px; opacity: .5; }
  </style>

  <text class="frame-lbl" x="320" y="16" text-anchor="middle">inside one SERIALIZABLE block-execution transaction</text>
  <rect class="frame" x="20" y="26" width="600" height="95" rx="4"/>

  <g class="stage s1">
    <rect class="box" x="40" y="42" width="170" height="65"/>
    <text class="box-lbl" x="125" y="68" text-anchor="middle">execute_transactions</text>
    <text class="box-sub" x="125" y="86" text-anchor="middle">credits, debits, inserts</text>
    <text class="box-sub" x="125" y="99" text-anchor="middle">new bridge_mints rows</text>
  </g>

  <g class="stage s2">
    <rect class="box" x="235" y="42" width="170" height="65"/>
    <text class="box-lbl" x="320" y="68" text-anchor="middle">verify_block_refills</text>
    <text class="box-sub" x="320" y="86" text-anchor="middle">helios → finalized check</text>
    <text class="box-sub" x="320" y="99" text-anchor="middle">per new mint row</text>
  </g>

  <g class="stage s3">
    <rect class="box" x="430" y="42" width="170" height="65"/>
    <text class="box-lbl" x="515" y="68" text-anchor="middle">StateRoot.compute</text>
    <text class="box-sub" x="515" y="86" text-anchor="middle">includes bridge_mints_root</text>
    <text class="box-sub" x="515" y="99" text-anchor="middle">over all four tables</text>
  </g>

  <line class="arr" x1="210" y1="74" x2="232" y2="74"/>
  <polygon class="arr-h" points="232,74 226,71 226,77"/>
  <line class="arr" x1="405" y1="74" x2="427" y2="74"/>
  <polygon class="arr-h" points="427,74 421,71 421,77"/>

  <text class="note" x="320" y="145" text-anchor="middle">Failure at any stage rolls back the whole block. No partial state, no external side effect.</text>
</svg>
