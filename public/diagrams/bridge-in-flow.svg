<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 440">
  <style>
    :root { --c: #333; --dim: .25; }
    @media (prefers-color-scheme: dark) { :root { --c: #ccc; } }
    text { font-family: ui-sans-serif, system-ui, sans-serif; fill: var(--c); }
    .row { opacity: var(--dim); }
    @keyframes hi { 0%,14%{ opacity:1; } 16%,100%{ opacity:var(--dim); } }
    .r1 { animation: hi 18s infinite  0s; }
    .r2 { animation: hi 18s infinite  3s; }
    .r3 { animation: hi 18s infinite  6s; }
    .r4 { animation: hi 18s infinite  9s; }
    .r5 { animation: hi 18s infinite 12s; }
    .r6 { animation: hi 18s infinite 15s; }
    .actor { font-size: 15px; font-weight: 700; }
    .desc  { font-size: 13px; opacity: .75; }
    .num   { font-size: 13px; font-weight: 700; opacity: .5; }
    .arr   { stroke: var(--c); stroke-width: 1.8; fill: none; marker-end: url(#ah); }
    .tok   { font-size: 11px; font-weight: 700; fill: #fff; }
    .usdc  { fill: #4d8fc9; }
    .usd   { fill: #d4a017; }
    .hash  { fill: #b85450; }
    .pre   { fill: #3d8b50; }
    .badge { font-size: 11px; font-weight: 700; fill: #fff; }
  </style>
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto" fill="var(--c)">
      <path d="M 0 0 L 10 5 L 0 10 z"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <g class="row r1">
    <text class="num" x="20" y="38">1</text>
    <text class="actor" x="60" y="38">Alice</text>
    <line class="arr" x1="130" y1="34" x2="340" y2="34"/>
    <circle class="usdc" cx="235" cy="24" r="10"/><text class="tok" x="235" y="28" text-anchor="middle">USDC</text>
    <text class="actor" x="360" y="38">ETH HTLC</text>
    <rect class="hash" x="470" y="24" width="70" height="20" rx="4"/>
    <text class="badge" x="505" y="38" text-anchor="middle">hash H</text>
    <text class="desc" x="60" y="58">Alice locks USDC on Ethereum under hash H</text>
  </g>

  <!-- Step 2 -->
  <g class="row r2">
    <text class="num" x="20" y="108">2</text>
    <text class="actor" x="60" y="108">ETH HTLC</text>
    <line class="arr" x1="190" y1="104" x2="340" y2="104"/>
    <text class="actor" x="360" y="108">Operator</text>
    <text class="desc" x="60" y="128">Operator watches for Locked event; waits for finality (~12-15 min)</text>
  </g>

  <!-- Step 3 -->
  <g class="row r3">
    <text class="num" x="20" y="178">3</text>
    <text class="actor" x="60" y="178">Operator</text>
    <line class="arr" x1="175" y1="174" x2="340" y2="174"/>
    <circle class="usd" cx="260" cy="164" r="10"/><text class="tok" x="260" y="168" text-anchor="middle">USD</text>
    <text class="actor" x="360" y="178">2D pool</text>
    <text class="desc" x="60" y="198">refill_mint creates USD-stable; verifier re-checks via helios</text>
  </g>

  <!-- Step 4 -->
  <g class="row r4">
    <text class="num" x="20" y="248">4</text>
    <text class="actor" x="60" y="248">Operator</text>
    <line class="arr" x1="175" y1="244" x2="340" y2="244"/>
    <circle class="usd" cx="260" cy="234" r="10"/><text class="tok" x="260" y="238" text-anchor="middle">USD</text>
    <text class="actor" x="360" y="248">2D HTLC</text>
    <rect class="hash" x="460" y="234" width="70" height="20" rx="4"/>
    <text class="badge" x="495" y="248" text-anchor="middle">hash H</text>
    <text class="desc" x="60" y="268">Operator locks USD-stable on 2D HTLC under same hash H</text>
  </g>

  <!-- Step 5 -->
  <g class="row r5">
    <text class="num" x="20" y="318">5</text>
    <text class="actor" x="60" y="318">Alice on 2D</text>
    <line class="arr" x1="200" y1="314" x2="340" y2="314"/>
    <text class="actor" x="360" y="318">2D HTLC</text>
    <rect class="pre" x="460" y="304" width="100" height="20" rx="4"/>
    <text class="badge" x="510" y="318" text-anchor="middle">preimage P</text>
    <text class="desc" x="60" y="338">Alice claims with preimage P; USD-stable is hers</text>
  </g>

  <!-- Step 6 -->
  <g class="row r6">
    <text class="num" x="20" y="388">6</text>
    <text class="actor" x="60" y="388">Operator</text>
    <line class="arr" x1="175" y1="384" x2="340" y2="384"/>
    <text class="actor" x="360" y="388">ETH HTLC</text>
    <rect class="pre" x="460" y="374" width="100" height="20" rx="4"/>
    <text class="badge" x="510" y="388" text-anchor="middle">preimage P</text>
    <circle class="usdc" cx="260" cy="374" r="10"/><text class="tok" x="260" y="378" text-anchor="middle">USDC</text>
    <text class="desc" x="60" y="408">Operator claims original USDC on Ethereum with same P</text>
  </g>

  <!-- Divider lines between steps -->
  <line x1="40" y1="70" x2="560" y2="70" stroke="var(--c)" stroke-width=".5" opacity=".12"/>
  <line x1="40" y1="140" x2="560" y2="140" stroke="var(--c)" stroke-width=".5" opacity=".12"/>
  <line x1="40" y1="210" x2="560" y2="210" stroke="var(--c)" stroke-width=".5" opacity=".12"/>
  <line x1="40" y1="280" x2="560" y2="280" stroke="var(--c)" stroke-width=".5" opacity=".12"/>
  <line x1="40" y1="350" x2="560" y2="350" stroke="var(--c)" stroke-width=".5" opacity=".12"/>
</svg>
