<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="snp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef9ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="orch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7e6"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="epyc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="onchain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="440" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#0f172a">Bridge operator deployment — pre-mainnet rehearsal on a single EPYC host</text>
  <text x="440" y="48" text-anchor="middle" font-size="12" fill="#475569">SEV-SNP confidential VMs around the security-critical components, regular VM for the public-facing orchestrator</text>

  <!-- EPYC host outer box -->
  <rect x="40" y="70" width="640" height="380" rx="14" fill="url(#epyc)" stroke="#475569" stroke-width="2"/>
  <text x="60" y="96" font-size="13" font-weight="600" fill="#0f172a">EPYC host (3rd-gen Milan or newer)</text>
  <text x="60" y="112" font-size="11" fill="#64748b">AMD Secure Processor • measured boot • microcode up to date</text>

  <!-- vm-orch (regular VM) -->
  <rect x="70" y="140" width="270" height="130" rx="10" fill="url(#orch)" stroke="#d97706" stroke-width="1.8"/>
  <text x="86" y="164" font-size="13" font-weight="600" fill="#7c2d12">vm-orch (regular VM, not SEV-SNP)</text>
  <text x="86" y="184" font-size="11" fill="#7c2d12">Host A — orchestrator</text>
  <text x="86" y="204" font-size="11" fill="#7c2d12">Elixir bridge process • HTTP API</text>
  <text x="86" y="220" font-size="11" fill="#7c2d12">Ethereum chain watcher</text>
  <text x="86" y="240" font-size="10.5" fill="#9a3412" font-style="italic">treated as compromise-prone</text>

  <!-- vm-vault (SEV-SNP) -->
  <rect x="380" y="140" width="270" height="130" rx="10" fill="url(#snp)" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="396" y="164" font-size="13" font-weight="600" fill="#1e3a8a">vm-vault (SEV-SNP)</text>
  <text x="396" y="184" font-size="11" fill="#1e3a8a">Host B — signing service</text>
  <text x="396" y="204" font-size="11" fill="#1e3a8a">Vault Transit + OPA sidecar</text>
  <text x="396" y="220" font-size="11" fill="#1e3a8a">signed Rego bundles, calldata-aware</text>
  <text x="396" y="240" font-size="10.5" fill="#1e3a8a" font-style="italic">memory encrypted • image attested</text>

  <!-- vm-bp (SEV-SNP) -->
  <rect x="70" y="290" width="270" height="140" rx="10" fill="url(#snp)" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="86" y="314" font-size="13" font-weight="600" fill="#1e3a8a">vm-bp (SEV-SNP)</text>
  <text x="86" y="334" font-size="11" fill="#1e3a8a">Block producer + Postgres</text>
  <text x="86" y="354" font-size="11" fill="#1e3a8a">chain state • operator schema</text>
  <text x="86" y="370" font-size="11" fill="#1e3a8a">bridge_audit_log (append-only)</text>
  <text x="86" y="390" font-size="11" fill="#1e3a8a">LUKS-encrypted disk</text>
  <text x="86" y="410" font-size="10.5" fill="#1e3a8a" font-style="italic">producer key signing path direct to HSM</text>

  <!-- vm-nethsm (SEV-SNP) -->
  <rect x="380" y="290" width="270" height="140" rx="10" fill="url(#snp)" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="396" y="314" font-size="13" font-weight="600" fill="#1e3a8a">vm-nethsm (SEV-SNP)</text>
  <text x="396" y="334" font-size="11" fill="#1e3a8a">Host C — HSM root</text>
  <text x="396" y="354" font-size="11" fill="#1e3a8a">NetHSM software image</text>
  <text x="396" y="374" font-size="11" fill="#1e3a8a">namespace=bridge → 2d_side, eth_side</text>
  <text x="396" y="390" font-size="11" fill="#1e3a8a">namespace=producer → block-signing key</text>
  <text x="396" y="410" font-size="10.5" fill="#1e3a8a" font-style="italic">REST endpoint, identical to physical appliance</text>

  <!-- on-chain layer (right side, outside the host) -->
  <rect x="710" y="140" width="140" height="290" rx="10" fill="url(#onchain)" stroke="#047857" stroke-width="1.8"/>
  <text x="780" y="166" text-anchor="middle" font-size="13" font-weight="600" fill="#064e3b">On-chain layer</text>
  <text x="780" y="186" text-anchor="middle" font-size="11" fill="#064e3b">(out of host scope)</text>
  <line x1="725" y1="200" x2="835" y2="200" stroke="#047857" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="780" y="222" text-anchor="middle" font-size="11" fill="#064e3b" font-weight="600">OperatorVault</text>
  <text x="780" y="238" text-anchor="middle" font-size="10" fill="#064e3b">UUPS, on Ethereum</text>
  <text x="780" y="254" text-anchor="middle" font-size="10" fill="#064e3b">bridgeOut allowlist</text>
  <text x="780" y="268" text-anchor="middle" font-size="10" fill="#064e3b">perTxCap, 24h cap</text>
  <line x1="725" y1="288" x2="835" y2="288" stroke="#047857" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="780" y="310" text-anchor="middle" font-size="11" fill="#064e3b" font-weight="600">Verifier binding</text>
  <text x="780" y="326" text-anchor="middle" font-size="10" fill="#064e3b">claimer-allowlist</text>
  <text x="780" y="340" text-anchor="middle" font-size="10" fill="#064e3b">replayed by every</text>
  <text x="780" y="354" text-anchor="middle" font-size="10" fill="#064e3b">honest verifier</text>
  <line x1="725" y1="374" x2="835" y2="374" stroke="#047857" stroke-width="0.8" stroke-dasharray="2,2"/>
  <text x="780" y="396" text-anchor="middle" font-size="10" fill="#064e3b" font-style="italic">durable last line</text>
  <text x="780" y="412" text-anchor="middle" font-size="10" fill="#064e3b" font-style="italic">no host trust</text>

  <!-- arrows -->
  <!-- orch -> vault -->
  <line x1="340" y1="195" x2="378" y2="195" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="359" y="188" text-anchor="middle" font-size="9.5" fill="#1d4ed8">mTLS</text>

  <!-- vault -> nethsm bridge namespace -->
  <line x1="515" y1="270" x2="515" y2="290" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="525" y="284" font-size="9.5" fill="#1d4ed8">namespace=bridge</text>

  <!-- bp -> nethsm producer namespace (bypasses Host B) -->
  <path d="M 340 360 L 360 360 L 360 320 L 378 320" fill="none" stroke="#1d4ed8" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="365" y="312" font-size="9.5" fill="#1d4ed8">namespace=producer</text>
  <text x="365" y="346" font-size="9" fill="#475569" font-style="italic">bypasses Host B</text>

  <!-- attestation report (PSP -> verifier) — schematic dashed -->
  <text x="60" y="124" font-size="11" fill="#64748b">⟶</text>
  <text x="78" y="124" font-size="11" fill="#64748b" font-style="italic">attestation reports verified at every cross-VM call</text>

  <!-- on-chain connection arrows from vault and verifier off-host -->
  <line x1="650" y1="220" x2="708" y2="240" stroke="#047857" stroke-width="1.4" marker-end="url(#arrowGreen)" stroke-dasharray="3,3"/>
  <text x="676" y="218" font-size="9.5" fill="#047857" text-anchor="middle">bridgeOut</text>

  <line x1="340" y1="370" x2="708" y2="320" stroke="#047857" stroke-width="1.2" marker-end="url(#arrowGreen)" stroke-dasharray="3,3"/>

  <!-- legend -->
  <rect x="40" y="466" width="800" height="42" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <rect x="56" y="478" width="14" height="14" rx="3" fill="url(#snp)" stroke="#1d4ed8"/>
  <text x="76" y="490" font-size="11" fill="#0f172a">SEV-SNP confidential VM</text>
  <rect x="240" y="478" width="14" height="14" rx="3" fill="url(#orch)" stroke="#d97706"/>
  <text x="260" y="490" font-size="11" fill="#0f172a">regular VM (compromise-prone)</text>
  <rect x="450" y="478" width="14" height="14" rx="3" fill="url(#onchain)" stroke="#047857"/>
  <text x="470" y="490" font-size="11" fill="#0f172a">on-chain layer (no host trust)</text>
  <line x1="660" y1="485" x2="690" y2="485" stroke="#047857" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrowGreen)"/>
  <text x="696" y="490" font-size="11" fill="#0f172a">on-chain enforcement</text>
</svg>
